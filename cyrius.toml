[project]
name = "encom-hits"
version = "1.0.0"
description = "ENCOM's Hits — retro arcade game collection in Cyrius"
license = "GPL-3.0-only"
repository = "https://github.com/MacCracken/encom-hits"

[deps]
# stdlib modules auto-included by cyrius build (order matters — single-pass compiler)
stdlib = ["string", "alloc", "fmt"]

[build]
src = "src/main.cyr"
out = "build/encom-hits"

[toolchain]
min = "4.8.5"
